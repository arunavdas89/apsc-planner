<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>APSC CCE 2026</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--forest:#1B3D2F;--forest-mid:#2D5E47;--forest-light:#E8F2ED;--forest-pale:#F2F8F4;--amber:#C47A2B;--amber-light:#FDF0E0;--amber-pale:#FEF8F0;--red:#A32D2D;--red-light:#FCEBEB;--purple:#534AB7;--purple-light:#EEEDFE;--blue:#185FA5;--blue-light:#E6F1FB;--cream:#F7F5F0;--white:#FEFEFE;--ink:#181818;--ink-mid:#444;--ink-light:#777;--ink-pale:#AAA;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--r:12px;--rs:8px;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--cream);color:var(--ink);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--cream)}
.hdr{background:var(--forest);color:white;padding:calc(var(--safe-top)+14px) 18px 14px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo{width:30px;height:30px;background:var(--amber);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:white;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.hdr-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pbadge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.15)}
.pbadge.ph1{background:rgba(196,122,43,.35)}.pbadge.ph2{background:rgba(255,255,255,.15)}.pbadge.ph3{background:rgba(196,122,43,.35)}.pbadge.ph4{background:rgba(163,45,45,.4)}
.dctr{font-family:'Space Mono',monospace;font-size:11px;opacity:.6}
.prog-track{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .5s ease}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:calc(var(--safe-top)+88px);z-index:99}

.tb{flex-shrink:0;padding:11px 13px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--ink-light);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}

.main{flex:1;padding:14px;padding-bottom:calc(20px + var(--safe-bottom))}
.tc{display:none}.tc.active{display:block}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}

.metric{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.mlbl{font-size:10px;color:var(--ink-light);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.mval{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--forest)}
.guidance-card{border-left:4px solid var(--forest);background:var(--forest-pale);border-radius:0 var(--rs) var(--rs) 0;padding:13px 15px;margin-bottom:12px;font-size:13px;line-height:1.65;color:var(--ink-mid)}
.g-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--forest);margin-bottom:5px}
.alloc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.alloc-row:last-child{border-bottom:none}
.alloc-time{width:36px;height:36px;border-radius:var(--rs);background:var(--forest-pale);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--forest);flex-shrink:0}

.today-header{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}

.section-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-pale);margin:16px 0 8px 0}

.chk.checked{background:var(--forest-light);border-color:var(--forest)}
.task-body{flex:1}
.task-subj{font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.task-text{font-size:14px;color:var(--ink);line-height:1.45}
.urg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.reshuffle-btn{width:100%;padding:14px;background:var(--forest);color:white;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .15s}
.reshuffle-btn:active{opacity:.85}
.all-done{background:var(--forest-pale);border:1px solid var(--forest-light);border-radius:var(--r);padding:24px 20px;text-align:center;color:var(--forest);margin-top:8px}
.all-done-icon{font-size:26px;margin-bottom:6px}
.all-done-title{font-size:16px;font-weight:600;margin-bottom:4px}
.all-done-fw{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.all-done-msg{font-size:13px;color:var(--ink-mid);line-height:1.6}
.empty-day{background:var(--cream);border-radius:var(--r);padding:20px;text-align:center;color:var(--ink-light);font-size:14px}
.overflow-warn{background:var(--red-light);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px;font-size:13px;color:var(--red);line-height:1.5}

.exam-banner-title{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px}
.exam-seq{font-size:12px;opacity:.65;margin-top:10px;line-height:1.6}
.week-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.wk-btn{padding:5px 10px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;border-radius:20px;border:1.5px solid var(--border-strong);background:var(--white);color:var(--ink-light);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}

.week-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px}
.week-lbl{font-size:13px;font-weight:600;flex:1;line-height:1.4}
.sched-day{padding:10px 0;border-bottom:1px solid var(--border)}
.sched-day:last-child{border-bottom:none}
.sched-day.is-today{background:var(--forest-pale);margin:0 -14px;padding:10px 14px;border-radius:var(--rs)}
.sched-day.is-past{opacity:.55}
.sched-day-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-light);margin-bottom:7px}
.sched-day-lbl.is-today-lbl{color:var(--forest)}
.sched-task{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;font-size:13px;color:var(--ink-mid)}
.sched-task:last-child{margin-bottom:0}
.sched-task.done-task{opacity:.45;text-decoration:line-through}
.sched-task.moved-away{opacity:.4;font-style:italic}
.sched-task.incoming{color:var(--amber);font-style:italic}
.sched-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sched-txt{flex:1;line-height:1.4}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.badge-moved{background:var(--red-light);color:var(--red)}.badge-incoming{background:var(--amber-light);color:#854F0B}
.subject-row{margin-bottom:13px}
.subj-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.subj-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px}
.p-pill{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.p-crit{background:var(--red-light);color:var(--red)}.p-high{background:var(--amber-light);color:#854F0B}.p-maint{background:var(--forest-light);color:var(--forest)}
.subj-qs{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--forest)}
.subj-bar-track{height:7px;background:var(--cream);border-radius:4px;overflow:hidden;margin-bottom:3px}
.subj-bar-fill{height:100%;border-radius:4px}
.bar-c{background:#E24B4A}.bar-h{background:var(--amber)}.bar-m{background:var(--forest-mid)}
.subj-note{font-size:12px;color:var(--ink-light)}
.trend-table{width:100%;border-collapse:collapse;font-size:12px}
.trend-table th{text-align:left;padding:5px 4px;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-light);border-bottom:1px solid var(--border-strong)}
.trend-table td{padding:6px 4px;border-bottom:1px solid var(--border);color:var(--ink)}
.trend-table tr:last-child td{border-bottom:none}
.tu{color:var(--forest);font-weight:700}.td{color:var(--red);font-weight:700}.tn{color:var(--ink-light);font-weight:700}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-strong);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--forest);cursor:pointer;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.slider-lbl{font-size:13px;color:var(--ink-mid);min-width:95px;font-weight:500}
.slider-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;min-width:34px;text-align:right;color:var(--forest)}
.score-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.score-metric{background:var(--cream);border-radius:var(--rs);padding:12px;text-align:center}
.smlbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-light);font-weight:700;margin-bottom:3px}
.smval{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.score-advice{padding:13px 15px;border-radius:var(--rs);font-size:13px;line-height:1.6;border-left:4px solid;margin-bottom:14px}
.adv-g{background:var(--forest-pale);border-color:var(--forest);color:var(--ink-mid)}
.adv-w{background:var(--amber-light);border-color:var(--amber);color:var(--ink-mid)}
.adv-b{background:var(--red-light);border-color:var(--red);color:var(--ink-mid)}
.adv-strong{font-weight:600;color:var(--ink)}
.target-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.target-row:last-child{border-bottom:none}
.t-subj{font-size:13px;font-weight:500}.t-note{font-size:11px;color:var(--ink-light)}
.t-score{text-align:right;flex-shrink:0;padding-left:10px}
.t-frac{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--forest)}
.t-pct{font-size:11px;color:var(--ink-light)}
.fw-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fw-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fw-icon{width:32px;height:32px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700;font-family:'Space Mono',monospace}
.fw-name{font-size:14px;font-weight:600}
.fw-origin{font-size:11px;color:var(--ink-light)}
.fw-insight{font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:8px}
.fw-apsc{font-size:12px;line-height:1.55;padding:10px 12px;border-radius:var(--rs);border-left:3px solid}
.vorp-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}

.vorp-subj{font-size:13px;font-weight:500;flex:1}
.vorp-bar-wrap{width:80px;height:6px;background:var(--cream);border-radius:3px;overflow:hidden}
.vorp-bar{height:100%;border-radius:3px}
.vorp-label{font-size:11px;font-weight:700;min-width:48px;text-align:right}
.elo-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.elo-row:last-child{border-bottom:none}
.elo-subj{font-size:13px;font-weight:500;flex:1}
.elo-rating{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.elo-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border-strong);background:var(--cream);cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--ink-mid);flex-shrink:0;-webkit-appearance:none}
.pe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pe-card{background:var(--cream);border-radius:var(--rs);padding:12px;text-align:center}
.pe-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-light);font-weight:700;margin-bottom:3px}
.pe-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
.pe-advice{padding:12px 14px;border-radius:var(--rs);font-size:13px;line-height:1.6;margin-bottom:14px;border-left:4px solid}
.ev-result{background:var(--cream);border-radius:var(--rs);padding:16px;text-align:center;margin-bottom:12px}

.ev-sub{font-size:13px;color:var(--ink-light)}
.ev-formula{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-light);text-align:center;margin-top:8px;line-height:1.6}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--forest);color:white;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-top">
      <div class="logo">A</div>
      <div><div class="hdr-title">APSC CCE 2026</div><div class="hdr-sub">Dynamic Study Planner</div></div>

function inferUrgency(t){
  const s=t.toLowerCase();
  if(/current affairs|ca compile|ca sweep|ca final|ca june|ca may|ca week|\+ ca$|ca 30|ca weekly/.test(s))return 10;
  if(/\bmock\b|pyq/.test(s))return 9;
  if(/assam history|ahom|varman|buranji|yandabo|saraighat|lachit|patharughat|dhekiajuli|freedom movement|assam accord|ulfa/.test(s))return 9;
  if(/assam gk|lucent ias|charaideo|satra|folk dance|orunodoi|mmua|jal jeevan|kanaklata|atmanirbhar|tribes.*assam|awards/.test(s))return 9;
  if(/error log/.test(s))return 8;
  if(/polity|constitution|parliament|judiciary|election commission|fundamental rights|dpsp/.test(s))return 8;
  if(/economy|gdp|niti|rbi|gini|rostow|lorenz|fiscal|monetary|budget|interim budget/.test(s))return 8;
  if(/env|ecology|biodiversity|ramsar|convention|climate|sdg|green india/.test(s))return 7;
  if(/s&t|physics|chemistry|biology|space|isro|nanomaterial|iter|mirna|bioremediation/.test(s))return 7;
  if(/assam geography|brahmaputra.*trib|districts.*assam|borders.*assam|agroclimatic/.test(s))return 6;
  if(/geography|mountain|soil.*type|grassland|india geo|world geo/.test(s))return 5;
  if(/national history|ancient|medieval/.test(s))return 4;
  return 6;
}

function inferSubject(t){
  const s=t.toLowerCase();
  if(/current affairs|ca compile|ca sweep|ca final|\+ ca/.test(s))return'Current Affairs';
  if(/\bmock\b|pyq/.test(s))return'Mock / PYQ';
  if(/assam history|ahom|varman|buranji|saraighat|lachit|yandabo/.test(s))return'Assam History';
  if(/assam gk|lucent|folk dance|charaideo|satra|orunodoi|tribes.*assam|awards/.test(s))return'Assam GK';
  if(/assam geography|tributaries|agroclimatic/.test(s))return'Assam Geography';
  if(/polity|constitution|parliament|judiciary|election commission/.test(s))return'Polity';
  if(/economy|gdp|rostow|lorenz|gini|niti|rbi|fiscal|monetary|budget/.test(s))return'Economy';
  if(/env|ecology|biodiversity|ramsar|sdg|green india/.test(s))return'Env & Ecology';
  if(/s&t|physics|chemistry|biology|space|isro|iter/.test(s))return'S & T';
  if(/error log/.test(s))return'Error Log';
  if(/geography|mountain|soil|grassland/.test(s))return'India / World Geo';
  if(/national history|ancient|medieval/.test(s))return'National History';
  return'General';
}

// DATE UTILITIES
// ============================================================
function localISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isoNow(){return localISO(new Date());}
function isoToLocal(iso){const p=iso.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(iso,n){const d=isoToLocal(iso);d.setDate(d.getDate()+n);return localISO(d);}
function fmtDate(iso){const d=isoToLocal(iso);const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${DAYS[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;}
function dayNum(){const t=new Date();const tm=new Date(t.getFullYear(),t.getMonth(),t.getDate());const sm=new Date(2026,3,13);const diff=Math.floor((tm-sm)/86400000);return Math.max(1,Math.min(84,diff+1));}
function daysLeft(){const t=new Date();const tm=new Date(t.getFullYear(),t.getMonth(),t.getDate());const em=new Date(EXAM_Y,EXAM_M,EXAM_D);return Math.max(0,Math.ceil((em-tm)/86400000));}
function cutoffISO(){return localISO(new Date(CUTOFF_Y,CUTOFF_M,CUTOFF_D));}
function examISO(){return localISO(new Date(EXAM_Y,EXAM_M,EXAM_D));}
function phaseInfo(d){if(d<=14)return{n:1,name:'Calibrate',cls:'ph1'};if(d<=49)return{n:2,name:'Build',cls:'ph2'};if(d<=70)return{n:3,name:'Integrate',cls:'ph3'};return{n:4,name:'Peak',cls:'ph4'};}
function getTask(id){return TASKS.find(t=>t.id===id);}
function getSchedDate(id){return ST.rescheduled[id]||getTask(id)?.originalDate;}
function isCompleted(id){return ST.completed.includes(id);}
function getTasksForDate(iso,pendingOnly=false){return TASKS.filter(t=>{if(getSchedDate(t.id)!==iso)return false;if(pendingOnly&&isCompleted(t.id))return false;return true;});}
function getAllTaskCountForDate(iso){return TASKS.filter(t=>getSchedDate(t.id)===iso).length;}
function urgencyColor(u){if(u>=10)return'#0891B2';if(u>=9)return'#E85A30';if(u>=8)return'#D97706';if(u>=7)return'#059669';if(u>=6)return'#6B7280';return'#9CA3AF';}

// ============================================================
// RESHUFFLING ENGINE
// ============================================================
function cascadeTask(id,fromIso,depth=0){
  if(depth>60){if(!ST.overflow.includes(id))ST.overflow.push(id);return;}
  const nextIso=addDays(fromIso,1);
  if(nextIso>cutoffISO()){if(!ST.overflow.includes(id))ST.overflow.push(id);return;}
  const total=getAllTaskCountForDate(nextIso);
  if(total<2){ST.rescheduled[id]=nextIso;return;}
  const pending=getTasksForDate(nextIso,true);
  if(pending.length===0){cascadeTask(id,nextIso,depth+1);return;}
  const least=pending.reduce((m,t)=>(getTask(t.id)?.urgency||5)<(getTask(m.id)?.urgency||5)?t:m);
  cascadeTask(least.id,nextIso,depth+1);
  ST.rescheduled[id]=nextIso;
}

function reshuffleTask(id){ST.overflow=ST.overflow.filter(x=>x!==id);cascadeTask(id,isoNow());}
function reshuffleTodayMissed(){const t=isoNow();let c=0;getTasksForDate(t,true).forEach(t=>{reshuffleTask(t.id);c++;});saveST();return c;}
function autoCheckMissed(){
  const today=isoNow();
  if(ST.lastAutoCheck>=today)return 0;
  let n=0;
  let d=ST.lastAutoCheck?addDays(ST.lastAutoCheck,1):'2026-04-13';
  while(d<today){getTasksForDate(d,true).forEach(t=>{if(!ST.rescheduled[t.id]&&!ST.overflow.includes(t.id)){cascadeTask(t.id,d);n++;}});d=addDays(d,1);}
  ST.lastAutoCheck=today;saveST();return n;
}

// ============================================================
// COMPLETION WITH REWARD
// ============================================================
function toggleComplete(id){
  const wasDone=isCompleted(id);
  if(wasDone){ST.completed=ST.completed.filter(x=>x!==id);}
  else{
    ST.completed.push(id);
    ST.overflow=ST.overflow.filter(x=>x!==id);
    const task=getTask(id);
    const subj=task?.subject||'General';
    const reward=REWARDS_BY_SUBJECT[subj]||REWARDS_BY_SUBJECT['General'];
    showToast(`${reward.fw}: ${reward.msg.split('.')[0]}`);
    setTimeout(()=>{
      const today=isoNow();
      const all=getTasksForDate(today,false);
      const pending=all.filter(t=>!isCompleted(t.id));
      if(pending.length===0&&all.length>0)renderToday();
    },300);
  }
  saveST();
  renderAll();
}

function taskCardHTML(task,showFrom){
  const done=isCompleted(task.id);
  const isR=!!ST.rescheduled[task.id]&&ST.rescheduled[task.id]!==task.originalDate;
  const from=showFrom&&isR?`<div class="task-from">↩ carried from ${fmtDate(task.originalDate)}</div>`:'';
  return`<div class="task-card${done?' done':''}${isR&&showFrom?' rescheduled':''}" id="tc_${task.id}">
    ${from}<div class="task-row">
      <button class="chk${done?' checked':''}" onclick="toggleComplete('${task.id}')">${done?'✓':''}</button>
      <div class="task-body">
        <div class="task-subj" style="color:${task.color}">${task.subject}</div>
        <div class="task-text">${task.text}</div>
      </div>
      <div class="urg-dot" style="background:${urgencyColor(task.urgency)}"></div>
    </div>
  </div>`;
}

function renderToday(){
  const today=isoNow();const dn=dayNum();const ph=phaseInfo(dn);
  const el=document.getElementById('tab-today');
  if(today===examISO()){el.innerHTML=`<div class="exam-banner"><div class="exam-banner-title">EXAM DAY</div><div style="font-size:14px;opacity:.8">APSC CCE Prelims 2026</div><div class="exam-seq">Polity → Assam History → Assam GK → CA → Economy → Env &amp; Ecology → S&amp;T → Geography</div></div>`;return;}
  const all=getTasksForDate(today,false);
  const pending=all.filter(t=>!isCompleted(t.id));
  const done=all.filter(t=>isCompleted(t.id));
  const pct=all.length?Math.round(done.length/all.length*100):0;
  const sorted=[...pending].sort((a,b)=>{const aR=!!ST.rescheduled[a.id];const bR=!!ST.rescheduled[b.id];if(aR!==bR)return aR?-1:1;return b.urgency-a.urgency;});
  let html=`<div class="today-header">
    <div class="today-date">${fmtDate(today)}</div>
    <div class="today-meta"><span class="pd-inline pd${ph.n}"></span>Day ${dn} of 84 &nbsp;·&nbsp; Phase ${ph.n}: ${ph.name}</div>
    <div class="today-prog-row"><div class="today-prog-track"><div class="today-prog-fill" style="width:${pct}%"></div></div><div class="today-prog-text">${done.length}/${all.length} done</div></div>
  </div>`;
  if(ST.overflow.filter(id=>!isCompleted(id)).length>0)html+=`<div class="overflow-warn">⚠ ${ST.overflow.filter(id=>!isCompleted(id)).length} task(s) couldn't be rescheduled — too close to exam. Consider completing today.</div>`;
  if(all.length===0)html+=`<div class="empty-day">No tasks scheduled for today. Check the Schedule tab.</div>`;
  if(pending.length===0&&done.length>0){
    const r=FULL_DAY_REWARDS[dn%FULL_DAY_REWARDS.length];
    html+=`<div class="all-done"><div class="all-done-icon">✓</div><div class="all-done-title">All done for today.</div><div class="all-done-fw">${r.fw}</div><div class="all-done-msg">${r.msg}</div></div>`;
  }
  if(sorted.length>0){html+=`<div class="section-lbl">To do today</div>`;sorted.forEach(t=>{const isR=!!ST.rescheduled[t.id]&&ST.rescheduled[t.id]!==t.originalDate;html+=taskCardHTML(t,isR);});}
  if(done.length>0){html+=`<div class="section-lbl">Completed</div>`;done.forEach(t=>{html+=taskCardHTML(t,false);});}
  if(sorted.length>0)html+=`<button class="reshuffle-btn" onclick="handleReshuffle()">Reshuffle missed tasks to tomorrow →</button>`;
  el.innerHTML=html;
}

function calcScore(){
  const att=parseInt(document.getElementById('sl-att')?.value||90);
  const acc=parseInt(document.getElementById('sl-acc')?.value||85);
  const correct=Math.round(att*acc/100),wrong=att-correct;
  const score=Math.round((correct*2-wrong*0.5)*10)/10;
  const el=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  el('out-att',att);el('out-acc',acc+'%');el('sc-c',correct);el('sc-w',wrong);el('sc-s',score);
  const adv=document.getElementById('sc-adv');
  if(adv){if(score>=162){adv.className='score-advice adv-g';adv.innerHTML=`<span class="adv-strong">Strong zone.</span> ${score} marks puts you likely above cutoff.`;}else if(score>=145){adv.className='score-advice adv-w';adv.innerHTML=`<span class="adv-strong">Borderline.</span> ${score} marks is risky. Push accuracy above 85%.`;}else{adv.className='score-advice adv-b';adv.innerHTML=`<span class="adv-strong">Below target.</span> ${score} marks. Focus on accuracy — one wrong costs 0.5 net.`;}}
}

function calcPE(){
  const correct=parseInt(document.getElementById('pe-c')?.value||77);
  const wrong=parseInt(document.getElementById('pe-w')?.value||13);
  const attempted=correct+wrong;
  const actual=Math.round((correct*2-wrong*0.5)*10)/10;
  const acc=attempted>0?correct/attempted:0;
  const err=1-acc;
  const pe=acc===0?0:Math.round((acc*acc/(acc*acc+err*err))*200*10)/10;
  const gap=Math.round((pe-actual)*10)/10;
  const el=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  el('pe-cout',correct);el('pe-wout',wrong);
  el('pe-actual',actual);el('pe-score',pe);
  el('pe-gap',(gap>=0?'+':'')+gap);
  el('pe-acc',attempted>0?Math.round(acc*1000)/10+'%':'—');
  const adv=document.getElementById('pe-advice');
  if(adv){
    if(Math.abs(gap)<10){adv.className='pe-advice adv-g';adv.innerHTML=`<strong>True form.</strong> Your PE score (${pe}) closely matches your actual score (${actual}). Your attempt selection is well-calibrated — you're neither over-nor under-attempting.`;}
    else if(gap>10){adv.className='pe-advice adv-w';adv.innerHTML=`<strong>Pythagorean gap: +${gap}.</strong> Your accuracy quality (PE ${pe}) is higher than your actual score (${actual}). You're attempting too cautiously — at your accuracy rate, you should attempt more questions. The marks are there for the taking.`;}
    else{adv.className='pe-advice adv-b';adv.innerHTML=`<strong>Pythagorean gap: ${gap}.</strong> Your actual score (${actual}) exceeds your PE score (${pe}). Some lucky guesses involved. This gap often reverts — focus on building real accuracy rather than attempting borderline questions.`;}
  }
}

function calcEV(){
  const conf=parseInt(document.getElementById('ev-conf')?.value||40)/100;
  const ev=Math.round((conf*2-(1-conf)*0.5)*100)/100;
  const el=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  el('ev-cout',Math.round(conf*100)+'%');
  const verdict=document.getElementById('ev-verdict');
  const sub=document.getElementById('ev-sub');
  const formula=document.getElementById('ev-formula');
  if(verdict&&sub&&formula){
    if(ev>0){verdict.textContent='ATTEMPT IT';verdict.style.color='var(--forest)';sub.textContent=`Expected value: +${ev} marks per attempt`;}
    else if(ev===0){verdict.textContent='BREAK EVEN';verdict.style.color='var(--amber)';sub.textContent='EV = 0. Marginal to attempt — decide based on gut.';}
    else{verdict.textContent='SKIP IT';verdict.style.color='var(--red)';sub.textContent=`Expected value: ${ev} marks (negative — will cost you)`;}
    formula.textContent=`(${Math.round(conf*100)}% × 2) − (${Math.round((1-conf)*100)}% × 0.5) = ${ev}`;
  }
}

// RENDER STRATEGY (all frameworks + Elo ratings)
// ============================================================
function renderStrategy(){
  const eloHTML=Object.entries(ST.elo).map(([subj,rating])=>{
    const col=rating>=1400?'var(--forest)':rating>=1200?'var(--amber)':rating>=1000?'var(--ink-mid)':'var(--red)';
    const tier=rating>=1400?'Strong':rating>=1200?'Good':rating>=1000?'Building':'Needs work';
    return`<div class="elo-row">
      <div class="elo-subj">${subj}<div style="font-size:11px;color:${col}">${tier}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="elo-btn" onclick="adjustElo('${subj}',-25)">−</button>
        <div class="elo-rating" style="color:${col}">${rating}</div>
        <button class="elo-btn" onclick="adjustElo('${subj}',+25)">+</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-strategy').innerHTML=`
    <div style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:16px">Eight analytical frameworks from sports science, economics, and philosophy — each applied directly to your APSC preparation.</div>
    ${FRAMEWORKS.map(fw=>`
    <div class="fw-card">
      <div class="fw-header">
        <div class="fw-icon" style="background:${fw.iconBg};color:${fw.iconColor}">${fw.icon}</div>
        <div><div class="fw-name">${fw.name}</div><div class="fw-origin">${fw.origin}</div></div>
      </div>
      <div class="fw-insight">${fw.insight}</div>
      <div class="fw-apsc" style="background:${fw.apscBg};border-color:${fw.apscBorder};color:var(--ink-mid)"><strong style="color:${fw.apscBorder}">Your APSC application:</strong> ${fw.apsc}</div>
    </div>`).join('')}
    <div class="card" style="margin-top:4px">
      <div class="card-title">Elo subject ratings — update after each mock</div>
      <div style="font-size:12px;color:var(--ink-light);margin-bottom:12px;line-height:1.5">Rate your performance in each subject after every mock. Score above expected → tap +. Score below expected → tap −. Each adjustment is ±25 Elo points. Allocate extra study time to your lowest-rated subjects each week.</div>
      ${eloHTML}
    </div>`;
}

function adjustElo(subj,delta){
  if(!ST.elo)ST.elo={};
  ST.elo[subj]=(ST.elo[subj]||1200)+delta;
  ST.elo[subj]=Math.max(600,Math.min(2000,ST.elo[subj]));
  saveST();renderStrategy();
  showToast(`${subj} Elo: ${ST.elo[subj]}${delta>0?' ↑':' ↓'}`);
}

// RENDER ALL
// ============================================================
let activeTab='today';
function renderAll(){
  renderHeader();
  if(activeTab==='today')renderToday();
  else if(activeTab==='dashboard')renderDashboard();
  else if(activeTab==='schedule')renderSchedule(schedWk);
  else if(activeTab==='subjects')renderSubjects();
  else if(activeTab==='score')renderScore();
  else if(activeTab==='strategy')renderStrategy();
}

function renderHeader(){
  const dn=dayNum(),dl=daysLeft(),ph=phaseInfo(dn);
  document.getElementById('phase-badge').textContent=`Phase ${ph.n}: ${ph.name}`;
  document.getElementById('phase-badge').className=`pbadge ${ph.cls}`;
  document.getElementById('day-counter').textContent=`Day ${dn} · ${dl} left`;
  document.getElementById('prog-fill').style.width=`${Math.round(dn/84*100)}%`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},3000);
}

document.querySelectorAll('.tb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    activeTab=btn.dataset.tab;
    document.getElementById('tab-'+activeTab).classList.add('active');
    renderAll();
  });
});

loadST();
const autoN=autoCheckMissed();
renderHeader();renderToday();renderDashboard();renderSchedule(1);renderSubjects();renderScore();renderStrategy();
if(autoN>0)setTimeout(()=>showToast(`Antifragility: ${autoN} missed task(s) auto-rescheduled`),600);
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
