<style>

.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0}

input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border-strong);outline:none}

<body>

    </div>
    <div class="hdr-meta">
      <span id="phase-badge" class="pbadge ph1">Phase 1</span>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const TOTAL_DAYS = 80;
const STORAGE_KEY = 'apsc_v7';

// ─────────────────────────────────────────────
// DATE UTILITIES (all local, no UTC conversion)
// ─────────────────────────────────────────────
function localISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoToLocal(iso) {
  const p = iso.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function isoNow() { return localISO(new Date()); }
function addDays(iso, n) {
  const d = isoToLocal(iso);
  d.setDate(d.getDate() + n);
  return localISO(d);
}
function fmtDate(iso) {
  const d = isoToLocal(iso);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAYS[d.getDay()]} ${d.getDate()} ${M[d.getMonth()]}`;
}
function isSunday(iso) {
  return isoToLocal(iso).getDay() === 0;
}
function dayNum() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(2026,3,17);
  const diff = Math.floor((today - start) / 86400000);
  return Math.max(1, Math.min(TOTAL_DAYS, diff + 1));
}
function daysLeft() {
  const today = new Date(); today.setHours(0,0,0,0);
  const exam = new Date(2026,6,5);
  return Math.max(0, Math.ceil((exam - today) / 86400000));
}
function phaseInfo(d) {
  if (d <= 14) return {n:1, name:'Calibrate', cls:'ph1'};
  if (d <= 49) return {n:2, name:'Build', cls:'ph2'};
  if (d <= 63) return {n:3, name:'Integrate', cls:'ph3'};
  return {n:4, name:'Peak', cls:'ph4'};
}

function inferUrgency(t) {
  const s = t.toLowerCase();
  if (/revision|re-drill|re-quiz|compile|sweep|weekly compile/.test(s)) return 10;
  if (/current affairs|\+ ca$|ca 30|ca weekly|ca compile|ca sweep/.test(s)) return 10;
  if (/\bmock\b|pyq/.test(s)) return 9;
  if (/assam history|ahom|varman|buranji|yandabo|saraighat|lachit|patharughat|dhekiajuli|freedom movement|assam accord|ulfa/.test(s)) return 9;
  if (/assam gk|lucent|charaideo|satra|folk dance|orunodoi|mmua|jal jeevan|kanaklata|tribes.*assam|awards|personalities/.test(s)) return 9;
  if (/error log/.test(s)) return 8;
  if (/polity|constitution|parliament|judiciary|election commission|fundamental rights|dpsp|article/.test(s)) return 8;
  if (/economy|gdp|niti|rbi|gini|rostow|lorenz|fiscal|monetary|budget|interim budget/.test(s)) return 8;
  if (/env|ecology|biodiversity|ramsar|convention|climate|sdg|green india/.test(s)) return 7;
  if (/s&t|physics|chemistry|biology|space|isro|nanomaterial|iter|mirna|bioremediation/.test(s)) return 7;
  if (/assam geography|brahmaputra.*trib|districts.*assam|agroclimatic|oil field/.test(s)) return 6;
  if (/geography|mountain|soil.*type|grassland|india geo|world geo/.test(s)) return 5;
  if (/national history|ancient|medieval/.test(s)) return 4;
  return 6;
}

function inferSubject(t) {
  const s = t.toLowerCase();
  if (/revision|re-quiz|re-drill/.test(s)) return 'Revision';
  if (/current affairs|\+ ca$|ca compile|ca sweep|ca 30/.test(s)) return 'Current Affairs';
  if (/\bmock\b|pyq/.test(s)) return 'Mock / PYQ';
  if (/assam history|ahom|varman|buranji|saraighat|lachit|yandabo|patharughat/.test(s)) return 'Assam History';
  if (/assam gk|lucent|folk dance|charaideo|satra|orunodoi|tribes.*assam|awards|personalities/.test(s)) return 'Assam GK';
  if (/assam geography|tributaries|agroclimatic|oil field/.test(s)) return 'Assam Geography';
  if (/polity|constitution|parliament|judiciary|election|article \d/.test(s)) return 'Polity';
  if (/economy|gdp|rostow|lorenz|gini|niti|rbi|fiscal|monetary|budget|demography/.test(s)) return 'Economy';
  if (/env|ecology|biodiversity|ramsar|sdg|green india|convention/.test(s)) return 'Env & Ecology';
  if (/s&t|physics|chemistry|biology|space|isro|iter|nanomaterial/.test(s)) return 'S & T';
  if (/error log/.test(s)) return 'Error Log';
  if (/geography|mountain|soil|grassland/.test(s)) return 'India / World Geo';
  if (/national history|ancient|medieval/.test(s)) return 'National History';
  return 'General';
}

// ─────────────────────────────────────────────
// TASK ACCESSORS
// ─────────────────────────────────────────────
function getTask(id) { return TASKS.find(t => t.id === id); }
function getSchedDate(id) { return ST.rescheduled[id] || getTask(id)?.originalDate; }
function isCompleted(id) { return ST.completed.includes(id); }
function getTasksForDate(iso, pendingOnly = false) {
  return TASKS.filter(t => {
    if (getSchedDate(t.id) !== iso) return false;
    if (pendingOnly && isCompleted(t.id)) return false;
    return true;
  });
}
function getAllTaskCountForDate(iso) {
  return TASKS.filter(t => getSchedDate(t.id) === iso).length;
}
function urgencyColor(u) {
  if (u >= 10) return '#534AB7';
  if (u >= 9) return '#E85A30';
  if (u >= 8) return '#D97706';
  if (u >= 7) return '#059669';
  if (u >= 6) return '#6B7280';
  return '#9CA3AF';
}

// ─────────────────────────────────────────────
// RESHUFFLING ENGINE (no reshuffling of Sunday tasks)
// ─────────────────────────────────────────────
function cascadeTask(id, fromIso, depth = 0) {
  if (depth > 60) { if (!ST.overflow.includes(id)) ST.overflow.push(id); return; }
  const nextIso = addDays(fromIso, 1);
  const exam = localISO(new Date(2026,6,2));
  if (nextIso > exam) { if (!ST.overflow.includes(id)) ST.overflow.push(id); return; }
  if (isSunday(nextIso)) { cascadeTask(id, nextIso, depth + 1); return; }
  const total = getAllTaskCountForDate(nextIso);
  if (total < 2) { ST.rescheduled[id] = nextIso; return; }
  const pending = getTasksForDate(nextIso, true).filter(t => !getTask(t.id)?.sunday);
  if (pending.length === 0) { cascadeTask(id, nextIso, depth + 1); return; }
  const least = pending.reduce((m, t) => (getTask(t.id)?.urgency || 5) < (getTask(m.id)?.urgency || 5) ? t : m);
  cascadeTask(least.id, nextIso, depth + 1);
  ST.rescheduled[id] = nextIso;
}

function reshuffleTask(id) {
  ST.overflow = ST.overflow.filter(x => x !== id);
  cascadeTask(id, isoNow());
}

function reshuffleTodayMissed() {
  const today = isoNow();
  let count = 0;
  getTasksForDate(today, true).filter(t => !getTask(t.id)?.sunday).forEach(t => {
    reshuffleTask(t.id);
    count++;
  });
  saveST();
  return count;
}

function autoCheckMissed() {
  const today = isoNow();
  if (ST.lastAutoCheck >= today) return 0;
  let n = 0;
  let d = ST.lastAutoCheck ? addDays(ST.lastAutoCheck, 1) : '2026-04-17';
  while (d < today) {
    if (!isSunday(d)) {
      getTasksForDate(d, true).filter(t => !getTask(t.id)?.sunday).forEach(t => {
        if (!ST.rescheduled[t.id] && !ST.overflow.includes(t.id)) {
          cascadeTask(t.id, d);
          n++;
        }
      });
    }
    d = addDays(d, 1);
  }
  ST.lastAutoCheck = today;
  saveST();
  return n;
}

function toggleComplete(id) {
  const wasDone = isCompleted(id);
  if (wasDone) {
    ST.completed = ST.completed.filter(x => x !== id);
  } else {
    ST.completed.push(id);
    ST.overflow = ST.overflow.filter(x => x !== id);
    const task = getTask(id);
    const subj = task?.subject || 'General';
    const reward = REWARDS[subj] || REWARDS['General'];
    showToast(`${reward.fw}: ${reward.msg.split('.')[0]}`);
  }
  saveST();
  renderAll();
}

function renderToday() {
  const today = isoNow();
  const dn = dayNum();
  const ph = phaseInfo(dn);
  const el = document.getElementById('tab-today');
  const examDay = localISO(new Date(2026,6,5));

  if (today === examDay) {
    el.innerHTML = `<div class="exam-banner"><div class="exam-banner-title">EXAM DAY</div><div style="font-size:14px;opacity:.8">APSC CCE Prelims 2026</div><div class="exam-seq">Polity → Assam History → Assam GK → CA → Economy → Env & Ecology → S&T → Geography</div></div>`;
    return;
  }

  const isSun = isSunday(today);
  const all = getTasksForDate(today, false);
  const pending = all.filter(t => !isCompleted(t.id));
  const done = all.filter(t => isCompleted(t.id));
  const pct = all.length ? Math.round(done.length / all.length * 100) : 0;

  const sorted = [...pending].sort((a, b) => {
    const aR = !!ST.rescheduled[a.id];
    const bR = !!ST.rescheduled[b.id];
    if (aR !== bR) return aR ? -1 : 1;
    return b.urgency - a.urgency;
  });

  let html = `<div class="today-header">
    <div class="today-date">${fmtDate(today)}${isSun ? ' — Revision Sunday' : ''}</div>
    <div class="today-meta">
      <span class="pd-inline ${isSun?'pd-sun':'pd'+ph.n}"></span>
      Day ${dn} of ${TOTAL_DAYS} &nbsp;·&nbsp; ${isSun ? 'Revision Day — no new content' : 'Phase '+ph.n+': '+ph.name}
    </div>
    <div class="today-prog-row">
      <div class="today-prog-track"><div class="today-prog-fill" style="width:${pct}%;background:${isSun?'var(--purple)':'var(--forest)'}"></div></div>
      <div class="today-prog-text" style="color:${isSun?'var(--purple)':'var(--forest)'}">${done.length}/${all.length} done</div>
    </div>
  </div>`;

  if (isSun) {
    html += `<div class="sunday-banner">
      <div class="sunday-title">Revision Sunday</div>
      <div class="sunday-rule">Zero new content today. Revise the week's topics, compile CA, re-drill PYQ on weak areas. Spaced repetition is where real learning is locked in.</div>
    </div>`;
  } else {
    html += `<div class="ca-banner">
      <div class="ca-icon">CA</div>
      <div><div class="ca-text">30 min Current Affairs — every day, no exceptions</div><div class="ca-sub">Assam Tribune (state) · PIB (national) · The Hindu (international) · Assam events in separate column</div></div>
    </div>`;
  }

  if (ST.overflow.filter(id => !isCompleted(id)).length > 0) {
    const ov = ST.overflow.filter(id => !isCompleted(id)).length;
    html += `<div class="overflow-warn">⚠ ${ov} task(s) couldn't be rescheduled — too close to exam. Consider completing today.</div>`;
  }

  if (all.length === 0) {
    html += `<div style="background:var(--cream);border-radius:var(--r);padding:20px;text-align:center;color:var(--ink-light);font-size:14px">No tasks scheduled for today. Check the Schedule tab.</div>`;
  }

  if (pending.length === 0 && done.length > 0) {
    const r = isSun
      ? SUNDAY_DONE_REWARDS[dn % SUNDAY_DONE_REWARDS.length]
      : FULL_DAY_REWARDS[dn % FULL_DAY_REWARDS.length];
    html += `<div class="all-done">
      <div class="all-done-icon">✓</div>
      <div class="all-done-title">${isSun ? 'Revision Sunday complete.' : 'All done for today.'}</div>
      <div class="all-done-fw">${r.fw}</div>
      <div class="all-done-msg">${r.msg}</div>
    </div>`;
  }

  if (sorted.length > 0) {
    html += `<div class="section-lbl">To do today</div>`;
    sorted.forEach(t => { html += taskCardHTML(t, !!ST.rescheduled[t.id] && ST.rescheduled[t.id] !== t.originalDate); });
  }
  if (done.length > 0) {
    html += `<div class="section-lbl">Completed</div>`;
    done.forEach(t => { html += taskCardHTML(t, false); });
  }
  if (sorted.length > 0 && !isSun) {
    html += `<button class="reshuffle-btn" onclick="handleReshuffle()">Reshuffle missed tasks to tomorrow →</button>`;
  }

  el.innerHTML = html;
}

function handleReshuffle() {
  const c = reshuffleTodayMissed();

}

let schedWk = 1;
function renderSchedule(wkNum) {
  schedWk = wkNum;
  const today = isoNow();
  const weekBtns = SD.map(wk => {
    const wkD = TASKS.filter(t => t.wk === wk.wk && isCompleted(t.id)).length;
    return `<button class="wk-btn${wk.wk===wkNum?' active':''}" onclick="renderSchedule(${wk.wk})">Wk ${wk.wk}${wkD>0?`<span class="wk-done">${wkD}</span>`:''}</button>`;
  }).join('');
  const wk = SD.find(w => w.wk === wkNum);
  const dayRows = wk.days.map((day, di) => {
    const dIdx = (wk.wk - 1) * 7 + di;
    const d = new Date(2026, 3, 17); d.setDate(d.getDate() + dIdx);
    const iso = localISO(d);
    const isPast = iso < today, isToday = iso === today;
    const isSun = !!day.sunday;
    const b1 = TASKS.find(t => t.wk === wkNum && t.di === di && t.bl === 1);
    const b2 = TASKS.find(t => t.wk === wkNum && t.di === di && t.bl === 2);
    const tr = (t) => {
      if (!t) return '';
      const done = isCompleted(t.id);
      const resched = ST.rescheduled[t.id];
      const moved = resched && resched !== iso;
      const isIn = t.originalDate !== iso && getSchedDate(t.id) === iso;
      let badge = '';
      if (moved) badge = `<span class="badge badge-moved">→ ${fmtDate(resched)}</span>`;
      if (isIn) badge = `<span class="badge badge-incoming">↩ from ${fmtDate(t.originalDate)}</span>`;
      return `<div class="sched-task${done?' done-task':''}${moved?' moved-away':''}${isIn?' incoming':''}">
        <span class="sched-dot" style="background:${t.color}"></span>
        <span class="sched-txt">${t.text}</span>${badge}
      </div>`;
    };
    const incoming = TASKS.filter(t => (t.wk !== wkNum || t.di !== di) && getSchedDate(t.id) === iso && !isCompleted(t.id));
    const lblCls = `sched-day-lbl${isToday?' is-today-lbl':''}${isSun?' sun-lbl':''}`;
    const sunChip = isSun ? `<span class="sun-chip">Revision</span>` : '';
    return `<div class="sched-day${isToday?' is-today':''}${isPast&&!isToday?' is-past':''}${isSun&&!isToday?' is-sunday':''}">
      <div class="${lblCls}">${fmtDate(iso)}${isToday?' · Today':''}${sunChip}</div>
      ${tr(b1)}${tr(b2)}
      ${incoming.map(t => `<div class="sched-task incoming"><span class="sched-dot" style="background:${t.color}"></span><span class="sched-txt">${t.text}</span><span class="badge badge-incoming">↩ from ${fmtDate(t.originalDate)}</span></div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('tab-schedule').innerHTML = `
    <div class="week-tabs">${weekBtns}</div>
    <div class="card">
      <div class="week-hdr"><div class="week-lbl">Week ${wk.wk} — ${wk.focus}</div><span class="pbadge ph${wk.ph}">Phase ${wk.ph}</span></div>
      ${dayRows}
    </div>`;
}

function adjustDistractor(i, d) {
  if (!ST.distractors) ST.distractors = {};
  ST.distractors[i] = Math.max(0, (ST.distractors[i] || 0) + d);
  saveST();
  const top = Object.entries(ST.distractors).sort((a,b) => b[1]-a[1])[0];
  const names = ['Factual flip','Year swap','Name swap','Partial truth','Condition reversal','Geographic misplacement'];
  if (top && top[1] > 0) showToast(`Top distractor: ${names[top[0]]} (${top[1]}×) — study this pattern`);
  renderSubjects();
}

      <div style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:12px">Like baseball's run differential, your PE score measures your <em>true preparation level</em> separate from lucky guesses. A large gap between PE and actual reveals whether you're over-cautious (leaving marks) or over-ambitious (guessing too much).</div>
      <div class="slider-row"><span class="slider-lbl">Correct answers</span><input type="range" min="0" max="100" step="1" value="77" id="pe-c" oninput="calcPE()"><span id="pe-cout" class="slider-val">77</span></div>
      <div class="slider-row"><span class="slider-lbl">Wrong answers</span><input type="range" min="0" max="100" step="1" value="13" id="pe-w" oninput="calcPE()"><span id="pe-wout" class="slider-val">13</span></div>
      <div class="pe-grid">
        <div class="pe-card"><div class="pe-lbl">Actual score</div><div id="pe-actual" class="pe-val">147.5</div></div>
        <div class="pe-card"><div class="pe-lbl">PE score</div><div id="pe-score" class="pe-val" style="color:var(--forest)">—</div></div>
        <div class="pe-card"><div class="pe-lbl">Gap</div><div id="pe-gap" class="pe-val" style="color:var(--amber)">—</div></div>
        <div class="pe-card"><div class="pe-lbl">Accuracy</div><div id="pe-acc" class="pe-val">85.6%</div></div>
      </div>
      <div id="pe-advice" class="pe-advice adv-w"></div>
      <div style="font-size:11px;color:var(--ink-pale);text-align:center">PE = (Accuracy²) ÷ (Accuracy² + Error%) × 200</div>
    </div>
    <div class="card">
      <div class="card-title">Expected Value — should I attempt this question?</div>
      <div style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:12px">Break-even is 20% confidence. If you have better than 1-in-5 odds, attempting is mathematically correct. Most candidates set their personal threshold at 50–60% — far too cautious.</div>
      <div class="slider-row"><span class="slider-lbl">Confidence %</span><input type="range" min="0" max="100" step="1" value="40" id="ev-conf" oninput="calcEV()"><span id="ev-cout" class="slider-val">40%</span></div>
      <div class="ev-result">
        <div id="ev-verdict" class="ev-verdict" style="color:var(--forest)">ATTEMPT IT</div>
        <div id="ev-sub" class="ev-sub">Expected value: +0.65 marks</div>
        <div id="ev-formula" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-light);margin-top:6px"></div>
      </div>
      <div style="background:var(--cream);border-radius:var(--rs);padding:12px;font-size:12px;color:var(--ink-light);line-height:1.6">You're leaving 5–10 marks per paper by being too cautious. The math says attempt if confidence > 20%.</div>
    </div>
    <div class="card">
      <div class="card-title">Subject-wise targets → 165+</div>
      ${TARGETS.map(r => `<div class="target-row">
        <div><div class="t-subj">${r.s}</div><div class="t-note">${r.note}</div></div>
        <div class="t-score"><div class="t-frac">${r.t}/${r.qs}</div><div class="t-pct">${Math.round(r.t/r.qs*100)}%</div></div>
      </div>`).join('')}
    </div>`;
  calcScore(); calcPE(); calcEV();
}

function calcScore() {
  const att = parseInt(document.getElementById('sl-att')?.value || 90);
  const acc = parseInt(document.getElementById('sl-acc')?.value || 85);
  const correct = Math.round(att * acc / 100), wrong = att - correct;
  const score = Math.round((correct * 2 - wrong * 0.5) * 10) / 10;
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('out-att', att); el('out-acc', acc + '%'); el('sc-c', correct); el('sc-w', wrong); el('sc-s', score);
  const adv = document.getElementById('sc-adv');
  if (adv) {
    if (score >= 162) { adv.className = 'score-advice adv-g'; adv.innerHTML = `<span class="adv-strong">Strong zone.</span> ${score} marks puts you above the likely cutoff.`; }
    else if (score >= 145) { adv.className = 'score-advice adv-w'; adv.innerHTML = `<span class="adv-strong">Borderline.</span> ${score} marks — push accuracy above 85%.`; }
    else { adv.className = 'score-advice adv-b'; adv.innerHTML = `<span class="adv-strong">Below target.</span> ${score} marks. Focus accuracy — one wrong costs 0.5 net.`; }
  }
}

function calcPE() {
  const correct = parseInt(document.getElementById('pe-c')?.value || 77);
  const wrong = parseInt(document.getElementById('pe-w')?.value || 13);
  const att = correct + wrong;
  const actual = Math.round((correct * 2 - wrong * 0.5) * 10) / 10;
  const acc = att > 0 ? correct / att : 0, err = 1 - acc;
  const pe = acc === 0 ? 0 : Math.round((acc * acc / (acc * acc + err * err)) * 200 * 10) / 10;
  const gap = Math.round((pe - actual) * 10) / 10;
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('pe-cout', correct); el('pe-wout', wrong); el('pe-actual', actual); el('pe-score', pe);
  el('pe-gap', (gap >= 0 ? '+' : '') + gap); el('pe-acc', att > 0 ? Math.round(acc * 1000) / 10 + '%' : '—');
  const adv = document.getElementById('pe-advice');
  if (adv) {
    if (Math.abs(gap) < 10) { adv.className = 'pe-advice adv-g'; adv.innerHTML = `<strong>True form.</strong> PE (${pe}) ≈ actual (${actual}). Your attempt selection is well-calibrated.`; }
    else if (gap > 10) { adv.className = 'pe-advice adv-w'; adv.innerHTML = `<strong>+${gap} gap.</strong> Your accuracy quality is higher than your score. Attempt more questions — the marks are there.`; }
    else { adv.className = 'pe-advice adv-b'; adv.innerHTML = `<strong>${gap} gap.</strong> Actual beats PE — some lucky guesses involved. Focus on real accuracy.`; }
  }
}

function calcEV() {
  const conf = parseInt(document.getElementById('ev-conf')?.value || 40) / 100;
  const ev = Math.round((conf * 2 - (1 - conf) * 0.5) * 100) / 100;
  const el = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
  el('ev-cout', Math.round(conf * 100) + '%');
  const v = document.getElementById('ev-verdict'), s = document.getElementById('ev-sub'), f = document.getElementById('ev-formula');
  if (v && s && f) {
    if (ev > 0) { v.textContent = 'ATTEMPT IT'; v.style.color = 'var(--forest)'; s.textContent = `Expected value: +${ev} marks per attempt`; }
    else if (ev === 0) { v.textContent = 'BREAK EVEN'; v.style.color = 'var(--amber)'; s.textContent = 'EV = 0. Marginal.'; }
    else { v.textContent = 'SKIP IT'; v.style.color = 'var(--red)'; s.textContent = `EV: ${ev} marks (negative)`; }
    f.textContent = `(${Math.round(conf*100)}% × 2) − (${Math.round((1-conf)*100)}% × 0.5) = ${ev}`;
  }
}

function renderStrategy() {
  const eloHTML = Object.entries(ST.elo).map(([subj, rating]) => {
    const col = rating >= 1400 ? 'var(--forest)' : rating >= 1200 ? 'var(--amber)' : rating >= 1000 ? 'var(--ink-mid)' : 'var(--red)';
    const tier = rating >= 1400 ? 'Strong' : rating >= 1200 ? 'Good' : rating >= 1000 ? 'Building' : 'Needs work';
    return `<div class="elo-row">
      <div class="elo-subj">${subj}<div style="font-size:11px;color:${col}">${tier}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="elo-btn" onclick="adjustElo('${subj}',-25)">−</button>
        <div class="elo-rating" style="color:${col}">${rating}</div>
        <button class="elo-btn" onclick="adjustElo('${subj}',+25)">+</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-strategy').innerHTML = `
    <div style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:16px">Eight analytical frameworks applied directly to your APSC preparation. Each one changes how you study, not just how you think about studying.</div>
    ${FRAMEWORKS.map(fw => `<div class="fw-card">
      <div class="fw-header">
        <div class="fw-icon" style="background:${fw.iconBg};color:${fw.iconColor}">${fw.icon}</div>
        <div><div class="fw-name">${fw.name}</div><div class="fw-origin">${fw.origin}</div></div>
      </div>
      <div class="fw-insight">${fw.insight}</div>
      <div class="fw-apsc" style="background:${fw.apscBg};border-color:${fw.apscBorder};color:var(--ink-mid)"><strong style="color:${fw.apscBorder}">Your APSC application:</strong> ${fw.apsc}</div>
    </div>`).join('')}
    <div class="card">
      <div class="card-title">Elo subject ratings — update after each mock</div>
      <div style="font-size:12px;color:var(--ink-light);margin-bottom:12px;line-height:1.5">After every mock: subjects where you scored above expected → tap +. Below expected → tap −. Allocate extra study time to lowest-rated subjects each week. ±25 per adjustment.</div>
      ${eloHTML}
    </div>`;
}

function adjustElo(subj, delta) {
  ST.elo[subj] = Math.max(600, Math.min(2000, (ST.elo[subj] || 1200) + delta));
  saveST(); renderStrategy();
  showToast(`${subj} Elo: ${ST.elo[subj]}${delta > 0 ? ' ↑' : ' ↓'}`);
}

let activeTab = 'today';
function renderAll() {
  renderHeader();
  if (activeTab === 'today') renderToday();
  else if (activeTab === 'dashboard') renderDashboard();
  else if (activeTab === 'schedule') renderSchedule(schedWk);
  else if (activeTab === 'subjects') renderSubjects();

function renderHeader() {
  const dn = dayNum(), dl = daysLeft(), ph = phaseInfo(dn);
  const today = isoNow();
  const isSun = isSunday(today);
  document.getElementById('phase-badge').textContent = isSun ? 'Revision Sunday' : `Phase ${ph.n}: ${ph.name}`;
  document.getElementById('phase-badge').className = `pbadge ${isSun ? 'ph-sun' : ph.cls}`;
  document.getElementById('day-counter').textContent = `Day ${dn} · ${dl} left`;
  document.getElementById('prog-fill').style.width = `${Math.round(dn / TOTAL_DAYS * 100)}%`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => { t.style.opacity = '0'; }, 3200);
}
document.querySelectorAll('.tb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tb').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tc').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('tab-' + activeTab).classList.add('active');
    renderAll();
  });
});
